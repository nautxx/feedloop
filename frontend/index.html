<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Fun facts, family stats, and little-known Barnachea trivia." />
    <title>Did You Know? | A minimalistic, customizable fact carousel.</title>

    <!-- Favicon -->
    <link rel="icon" href="/static/images/favicon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16x16.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Styles and scripts -->
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/themes.css" />
    <script defer src="/app.js"></script>
</head>

<body>
    <main class="container" aria-label="Barnachea Did You Know">
        <header class="hero">
            <h1>Did You Know?</h1>
            <p class="subtitle">Barnachea Edition</p>
        </header>

        <section class="fact-wrap" aria-live="polite" aria-atomic="true">
            <p id="fact" class="fact"></p>
        </section>
    </main>
    <div class="bottom-bar" aria-label="Site controls">
        <a href="https://github.com/nautxx/famifaqs" target="_blank" rel="noopener">
            <i class="fa-solid fa-code"></i> github
        </a>
        <span class="divider">·</span>
        <button type="button" id="theme-toggle">
            <i class="fa-solid fa-palette"></i>
            <span class="theme-label">theme</span>
        </button>
    </div>
    
    <div class="theme-modal" id="theme-modal" hidden>
        <div class="theme-modal-panel" role="dialog" aria-modal="true" aria-label="Choose theme">
            <button type="button" data-theme="calm" class="theme-option">
                <span>calm</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="lavender" class="theme-option">
                <span>lavender</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="muted" class="theme-option">
                <span>muted</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="olivia" class="theme-option">
                <span>olivia</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="paper" class="theme-option">
                <span>paper</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="pastel" class="theme-option">
                <span>pastel</span>
                <span class="swatch">
                    <i></i><i></i><i></i></span>
            </button>
            <button type="button" data-theme="quiet" class="theme-option">
                <span>quiet</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="ube" class="theme-option">
                <span>ube</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
        </div>
    </div>
</body>

</html>
