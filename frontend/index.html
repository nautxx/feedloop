<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="A living feed of family history, milestones, and moments—beautifully surfaced over time." />
    <title>Barnachea Feed — Powered by Feedloop</title>

    <!-- Favicon -->
    <link rel="icon" href="/static/images/favicon/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon/favicon-16x16.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Styles and scripts -->
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/themes.css" />
    <script defer src="/app.js"></script>
</head>

<body>
    <div class="drawer" id="notices-drawer" hidden>
        <div class="drawer-overlay"></div>

        <aside class="drawer-panel">
            <div class="drawer-body">
                <section class="drawer-section">
                    <div class="drawer-section-header">
                        <i class="fa-solid fa-message"></i>
                        <h4>Notifications</h4>
                    </div>
                    <div class="drawer-section-content" id="notifications-content">
                        <p class="drawer-empty">Nothing to show</p>
                    </div>
                </section>
            </div>
        </aside>
    </div>

    <main class="container" aria-label="Barnachea Did You Know">
        <div class="top-row">
            <button id="notice-toggle" class="top-row-button" type="button" aria-label="Open notifications">
                <i class="fa-solid fa-bell"></i>
            </button>
        </div>
        <div class="control-bar" aria-label="Feed controls">
            <div class="control-group desktop-controls" role="group" aria-label="Feed settings">
                <button class="control-option is-active" data-settings-group="mode" type="button">
                    <i class="fa-brands fa-modx"></i>mode
                </button>
                <button class="control-option" data-settings-group="rate" type="button">
                    <i class="fa-solid fa-clock"></i>rate
                </button>
            </div>
        
            <div class="control-group desktop-controls" id="desktop-settings-options" role="group"
                aria-label="Feed setting options"></div>
        
            <div class="control-group mobile-settings-group" role="group" aria-label="Feed settings menu">
                <button class="control-option" id="settings-toggle" type="button">
                    <i class="fa-solid fa-gear"></i>settings
                </button>
            </div>
        </div>

        <div class="content">
            <header class="hero">
                <h1>Did You Know?</h1>
                <p class="subtitle">Barnachea Edition</p>
            </header>

            <section class="item-wrap" aria-live="polite" aria-atomic="true">
                <p id="item" class="item"></p>
            </section>
        </div>

        <div id="focus-hint" class="focus-hint"></div>
        
        <div class="bottom-bar" aria-label="Site controls">
            <a href="https://github.com/nautxx/feedloop" target="_blank" rel="noopener">
                <i class="fa-solid fa-code"></i> github
            </a>
            <span class="divider">·</span>
            <button type="button" id="theme-toggle">
                <i class="fa-solid fa-palette"></i>
                <span class="theme-label">theme</span>
            </button>
            <button type="button" id="focus-toggle">
                <i class="fa-solid fa-expand"></i>
                <span class="theme-label">focus</span>
            </button>
            <button type="button" id="version-toggle">
                <i class="fa-solid fa-code-branch"></i>
                <span class="theme-label">v0.1.0-alpha</span>
            </button>
        </div>
    </main>

    <div class="settings-modal" id="settings-modal" hidden>
        <div class="settings-modal-panel" role="dialog" aria-modal="true" aria-label="Feed settings">
    
            <div class="settings-modal-body">
                <div class="settings-switch">
                    <button class="settings-option is-active" data-settings-group="mode">mode</button>
                    <button class="settings-option" data-settings-group="rate">rate</button>
                </div>

                <div class="settings-divider"></div>
                
                <section class="settings-section">
                    <div class="settings-options" id="settings-options"></div>
                </section>
            </div>
        </div>
    </div>

    <div class="theme-modal" id="theme-modal" hidden>
        <div class="theme-modal-panel" role="dialog" aria-modal="true" aria-label="Choose theme">
            <button type="button" data-theme="aguila" class="theme-option">
                <span>aguila</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="calm" class="theme-option">
                <span>calm</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="cheesecake" class="theme-option">
                <span>cheesecake</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="frozen-llama" class="theme-option">
                <span>frozen llama</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="laser" class="theme-option">
                <span>laser</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="lavender" class="theme-option">
                <span>lavender</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="muted" class="theme-option">
                <span>muted</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="nebula" class="theme-option">
                <span>nebula</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="olivia" class="theme-option">
                <span>olivia</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="paper" class="theme-option">
                <span>paper</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="pastel" class="theme-option">
                <span>pastel</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="rgb" class="theme-option">
                <span>rgb</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="sagada-cellar-door" class="theme-option">
                <span>sagada cellar door</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="trackspec" class="theme-option">
                <span>trackspec</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="trackspec-dark" class="theme-option">
                <span>trackspec dark</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="quiet" class="theme-option">
                <span>quiet</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
            <button type="button" data-theme="ube" class="theme-option">
                <span>ube</span>
                <span class="swatch">
                    <i></i><i></i><i></i>
                </span>
            </button>
        </div>
    </div>
</body>

</html>
